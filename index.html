<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKN44 Physics</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9ecf, #8fd3ff);
  text-align: center;
  margin: 0;
  padding: 10px;
  color: white;
}

h1 { margin: 10px 0; }

.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
  font-size: 16px;
  flex-wrap: wrap;
}

.game-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  max-width: 900px;
  margin: auto;
}

.column {
  background: white;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.3);
  color: black;
}

.card {
  background: #ffe3f1;
  margin: 6px;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 14px;
}

.card:hover { background: #cde9ff; }

.selected { background: #ffb3d9 !important; }

.correct {
  background: #a5d6a7 !important;
  pointer-events: none;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  font-size: 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

@media(max-width:700px){
  .game-container { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<h1>🎮 SKN44_Physics</h1>

<div class="stats">
  ⭐ คะแนน: <span id="score">0</span>
  ⏱ เวลา: <span id="timer">90</span>s
</div>

<button onclick="resetGame()">เริ่มใหม่</button>

<div class="game-container">
  <div class="column">
    <h3>จับคู่</h3>
    <div id="formulas"></div>
  </div>

  <div class="column">
    <h3>คำตอบ</h3>
    <div id="names"></div>
  </div>
</div>

<script>

const questionPool = [

  // ชุดที่ 1 (แก้ไขแล้ว)
  ["R = Nₐkᴮ","ความสัมพันธ์ค่าคงที่"],
  ["Q = CΔT","ความจุความร้อน"],
  ["n = m/M","สูตรหาโมล"],
  ["PV = nRT","กฎแก๊สอุดมคติ"],
  ["U = 3/2 nRT","พลังงานภายในแก๊สอุดมคติ"],
  ["PV = NkᴮT","กฎแก๊สระดับโมเลกุล"],
  ["N = nNₐ","สูตรหาจำนวนอนุภาค"],
  ["Ēk = 3/2 kᴮT","พลังงานจลน์เฉลี่ย"],
  ["Vrms = √(3RT/M)","อัตราเร็ว rms"],

  // ชุดที่ 2
  ["R","ค่าคงที่แก๊ส (8.314 J/mol·K)"],

  // ชุดที่ 3
  ["Q = mL","น้ำแข็งละลาย"],
  ["Q = mcΔT","ให้ความร้อนแล้วอุณหภูมิเปลี่ยน"],
  ["ΔW = PΔV","แก๊สขยายตัว"],
  ["ΔQ = ΔU + ΔW","ระบบรับความร้อนแล้วพลังงานเพิ่ม"],
  ["Vrms","อุณหภูมิสูงขึ้น → ความเร็วโมเลกุลเพิ่ม"]

];

let usedQuestions = [];
let selectedFormula = null;
let selectedName = null;
let score = 0;
let timeLeft = 90;
let timer;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startTimer(){
  clearInterval(timer);
  timeLeft = 90;
  document.getElementById("timer").textContent = timeLeft;

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if(timeLeft <= 0){
      endGame();
    }
  },1000);
}

function getRandomQuestions(){
  let available = questionPool.filter(q => !usedQuestions.includes(q[0]));

  if(available.length === 0){
    usedQuestions = [];
    available = questionPool;
  }

  const selected = shuffle(available).slice(0,3);
  selected.forEach(q => usedQuestions.push(q[0]));
  return selected;
}

function createCards(){
  const questions = getRandomQuestions();
  const formulas = shuffle(questions.map(q=>q[0]));
  const names = shuffle(questions.map(q=>q[1]));

  const fDiv = document.getElementById("formulas");
  const nDiv = document.getElementById("names");

  fDiv.innerHTML = "";
  nDiv.innerHTML = "";

  formulas.forEach(f=>{
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = f;
    card.onclick = ()=>selectFormula(card, questions);
    fDiv.appendChild(card);
  });

  names.forEach(n=>{
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = n;
    card.onclick = ()=>selectName(card, questions);
    nDiv.appendChild(card);
  });
}

function selectFormula(card, questions){
  if(selectedFormula) selectedFormula.classList.remove("selected");
  selectedFormula = card;
  card.classList.add("selected");
  check(questions);
}

function selectName(card, questions){
  if(selectedName) selectedName.classList.remove("selected");
  selectedName = card;
  card.classList.add("selected");
  check(questions);
}

function check(questions){
  if(selectedFormula && selectedName){

    const correctPair = questions.find(q=>q[0]===selectedFormula.textContent);

    if(correctPair && correctPair[1]===selectedName.textContent){

      selectedFormula.classList.add("correct");
      selectedName.classList.add("correct");

      score += 10;
      document.getElementById("score").textContent = score;

      setTimeout(()=>{
        createCards();
      },500);

    } else {

      score -= 5;
      if(score < 0) score = 0;
      document.getElementById("score").textContent = score;
    }

    selectedFormula.classList.remove("selected");
    selectedName.classList.remove("selected");
    selectedFormula = null;
    selectedName = null;
  }
}

function endGame(){
  clearInterval(timer);
  alert("หมดเวลา! คะแนนของคุณคือ " + score);
}

function resetGame(){
  score = 0;
  usedQuestions = [];
  document.getElementById("score").textContent = score;
  createCards();
  startTimer();
}

resetGame();

</script>

</body>
</html>
