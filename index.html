<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKN44 Physics</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#ff9ecf,#8fd3ff);
  text-align:center;
  color:white;
  margin:0;
}

.stats{
  margin:10px;
  font-size:18px;
}

.game{
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  color:black;
  margin:8px;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.card:hover{
  background:#cde9ff;
}

.correct{
  background:#a5d6a7 !important;
}

button{
  padding:8px 15px;
  margin:10px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🎮 SKN44_Physics</h1>

<div class="stats">
คะแนน: <span id="score">0</span> |
เวลา: <span id="timer">90</span>
</div>

<button onclick="resetGame()">เริ่มใหม่</button>

<div class="game">

<h3 id="formula"></h3>

<div id="choices"></div>

</div>

<script>

const questionPool = [
["Q = CΔT","ความจุความร้อน"],
["PV = nRT","กฎแก๊สอุดมคติ"],
["U = 3/2 nRT","พลังงานภายในแก๊สอุดมคติ"],
["Ēk = 3/2 kᴮT","พลังงานจลน์เฉลี่ย"],
["Vrms = √(3RT/M)","อัตราเร็ว rms"],
["R","ค่าคงที่แก๊ส (8.314 J/mol·K)"],
["Q = mL","น้ำแข็งละลาย"],
["Q = mcΔT","ให้ความร้อนแล้วอุณหภูมิเปลี่ยน"],
["ΔW = PΔV","แก๊สขยายตัว"],
["ΔQ = ΔU + ΔW","ระบบรับความร้อนแล้วพลังงานเพิ่ม"],
["Vrms","อุณหภูมิสูงขึ้น → ความเร็วโมเลกุลเพิ่ม"],

["kᴮ","ค่าคงที่ของโบลต์ซมันน์ (1.38 × 10⁻²³ J/K)"],
["Nₐ","เลขอาโวกาโดร (6.02 × 10²³ อนุภาค/mol)"],
["M","มวลโมลาร์ของสาร 1 โมล หน่วย g/mol"],
["0°C","273 K"]
];

let recentQuestions = [];
let currentAnswer = "";
let score = 0;
let timeLeft = 90;
let timer;

function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}

function startTimer(){

 clearInterval(timer);

 timeLeft = 90;
 document.getElementById("timer").textContent=timeLeft;

 timer=setInterval(()=>{

  timeLeft--;
  document.getElementById("timer").textContent=timeLeft;

  if(timeLeft<=0){
   clearInterval(timer);
   alert("หมดเวลาแล้ว คะแนน: "+score);
  }

 },1000);
}

function newQuestion(){

 let available = questionPool.filter(q =>
   !recentQuestions.includes(q[0])
 );

 if(available.length === 0){
   recentQuestions = [];
   available = questionPool;
 }

 let question = available[Math.floor(Math.random()*available.length)];

 recentQuestions.push(question[0]);

 if(recentQuestions.length > 3){
   recentQuestions.shift();
 }

 currentAnswer = question[1];

 document.getElementById("formula").textContent = question[0];

 let wrong = questionPool
  .filter(q=>q[1]!==question[1])
  .map(q=>q[1]);

 shuffle(wrong);

 let choices = shuffle([question[1], wrong[0], wrong[1]]);

 const div = document.getElementById("choices");
 div.innerHTML="";

 choices.forEach(choice=>{

  const card=document.createElement("div");
  card.className="card";
  card.textContent=choice;

  card.onclick=()=>checkAnswer(card,choice);

  div.appendChild(card);

 });

}

function checkAnswer(card,choice){

 if(choice===currentAnswer){

  card.classList.add("correct");

  score+=10;

  document.getElementById("score").textContent=score;

  setTimeout(newQuestion,500);

 }else{

  score-=5;
  if(score<0) score=0;

  document.getElementById("score").textContent=score;

 }

}

function resetGame(){

 score=0;
 recentQuestions=[];

 document.getElementById("score").textContent=score;

 startTimer();

 newQuestion();

}

resetGame();

</script>

</body>
</html>
